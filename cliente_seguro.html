<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <title>Estado de tu auto · Lavadero</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #273548;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      --brand: #3b82f6;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      max-width: 480px;
      padding: 28px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 800;
    }

    header p {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── BUSCADOR ── */
    .search-box {
      width: 100%;
      max-width: 480px;
      padding: 0 20px 24px;
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      outline: none;
    }

    .search-box input::placeholder {
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 1px;
      font-size: 15px;
    }

    .search-box input:focus {
      border-color: var(--brand);
    }

    .btn-buscar {
      padding: 14px 18px;
      background: var(--brand);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 22px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-buscar:active {
      opacity: 0.8;
    }

    /* ── CARD ESTADO ── */
    .status-card {
      width: calc(100% - 40px);
      max-width: 440px;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ── ESCENARIO ANIMADO ── */
    .escenario {
      width: 100%;
      height: 220px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── INFO ORDEN ── */
    .orden-info {
      padding: 18px 20px 4px;
      border-top: 1px solid var(--border);
    }

    .patente-badge {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }

    .orden-meta {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── ETAPA LABEL ── */
    .etapa-label {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .etapa-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .etapa-nombre {
      font-size: 20px;
      font-weight: 800;
    }

    .etapa-desc {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      padding: 0 20px 20px;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--card2);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-steps {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .step {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      flex: 1;
      position: relative;
    }

    .step.done {
      color: var(--text);
    }

    .step.active {
      font-weight: 700;
    }

    /* ── LISTO BANNER ── */
    .listo-banner {
      padding: 14px 20px;
      margin: 0 20px 20px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid #22c55e;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      color: #4ade80;
      font-weight: 600;
    }

    /* ── EMPTY / ERROR ── */
    .msg-box {
      width: calc(100% - 40px);
      max-width: 440px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .msg-box .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .msg-box p {
      font-size: 15px;
      color: var(--muted);
    }

    /* ── SPINNER ── */
    .spin-wrap {
      display: flex;
      justify-content: center;
      padding: 60px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ══════════════════════════════════════════
       PANTALLA ENTREGADO
    ══════════════════════════════════════════ */
    .entregado-card {
      width: calc(100% - 40px);
      max-width: 440px;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .entregado-hero {
      width: 100%;
      height: 210px;
      background: linear-gradient(160deg, #0c1a10 0%, #0f2a14 50%, #0a1f2e 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .entregado-emoji {
      font-size: 54px;
      line-height: 1;
      animation: pop-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .entregado-hero h2 {
      font-size: 24px;
      font-weight: 800;
      color: #f8fafc;
      text-align: center;
      animation: pop-in 0.7s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .entregado-hero .sub {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      animation: pop-in 0.7s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop-in {
      0% {
        transform: scale(0.4) translateY(10px);
        opacity: 0;
      }

      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    /* estrellas flotantes en el hero */
    .e-star {
      position: absolute;
      color: #fbbf24;
      pointer-events: none;
      animation: twinkle var(--dur) ease-in-out var(--delay) infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        transform: scale(0) rotate(0deg);
        opacity: 0;
      }

      40% {
        transform: scale(1.3) rotate(20deg);
        opacity: 1;
      }

      70% {
        transform: scale(0.8) rotate(40deg);
        opacity: 0.7;
      }
    }

    /* confetti dots */
    .confetti {
      position: absolute;
      border-radius: 2px;
      animation: confetti-fall var(--dur) ease-in var(--delay) infinite;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(220px) rotate(540deg);
        opacity: 0;
      }
    }

    .entregado-body {
      padding: 20px;
    }

    .visita-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .visita-chip .vc-icon {
      font-size: 22px;
    }

    .visita-chip .vc-text {
      font-size: 12px;
      color: var(--muted);
    }

    .visita-chip .vc-fecha {
      font-size: 15px;
      font-weight: 700;
      color: #fbbf24;
    }

    .patente-entregado {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .servicio-entregado {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .svc-titulo {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .svc-lista {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }

    .svc-pill {
      padding: 7px 14px;
      border-radius: 20px;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.25);
      font-size: 13px;
      color: #93c5fd;
      font-weight: 600;
      animation: pop-in 0.4s var(--delay) cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .volver-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.2s;
    }

    .volver-btn:active {
      opacity: 0.8;
    }

    /* ══════════════════════════════════════════
       ANIMACIONES POR ETAPA (existentes)
    ══════════════════════════════════════════ */
    .bg-recepcion {
      background: linear-gradient(160deg, #1a1208 0%, #2d1f0a 100%);
    }

    .bg-interior {
      background: linear-gradient(160deg, #0a1628 0%, #0f2744 100%);
    }

    .bg-exterior {
      background: linear-gradient(160deg, #0c1f3a 0%, #0a3055 100%);
    }

    .bg-secado {
      background: linear-gradient(160deg, #0d1f35 0%, #162d4a 100%);
    }

    .bg-encerado {
      background: linear-gradient(160deg, #1a1040 0%, #251560 100%);
    }

    .bg-listo {
      background: linear-gradient(160deg, #0a2010 0%, #0d3018 100%);
    }

    .auto-base {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
    }

    .barro {
      position: absolute;
      border-radius: 50% 40% 50% 40%;
      background: rgba(101, 67, 33, 0.65);
      animation: barro-pulse 2.5s ease-in-out infinite;
    }

    @keyframes barro-pulse {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1)
      }

      50% {
        opacity: 0.8;
        transform: scale(1.08)
      }
    }

    .aspiradora {
      position: absolute;
      bottom: 36px;
      animation: aspira-move 2.4s ease-in-out infinite;
    }

    @keyframes aspira-move {
      0% {
        left: 18%
      }

      40% {
        left: 60%
      }

      60% {
        left: 60%
      }

      100% {
        left: 18%
      }
    }

    .polvo {
      position: absolute;
      border-radius: 50%;
      background: rgba(200, 180, 140, 0.5);
      animation: polvo-float 1.6s ease-in-out infinite;
    }

    @keyframes polvo-float {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0.7
      }

      100% {
        transform: translate(var(--dx), var(--dy)) scale(0);
        opacity: 0
      }
    }

    .burbuja {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(147, 210, 255, 0.7);
      background: rgba(147, 210, 255, 0.08);
      animation: burbuja-up var(--dur) ease-in var(--delay) infinite;
    }

    @keyframes burbuja-up {
      0% {
        transform: translateY(0) scale(0.3);
        opacity: 0
      }

      10% {
        opacity: 0.8;
        transform: translateY(-10px) scale(1)
      }

      90% {
        opacity: 0.4
      }

      100% {
        transform: translateY(-160px) scale(0.6);
        opacity: 0
      }
    }

    .espuma {
      position: absolute;
      border-radius: 50%;
      background: rgba(200, 235, 255, 0.18);
      animation: espuma-spread 1.8s ease-out infinite;
    }

    @keyframes espuma-spread {
      0% {
        transform: scale(0.5);
        opacity: 0.6
      }

      100% {
        transform: scale(2.2);
        opacity: 0
      }
    }

    .viento {
      position: absolute;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, rgba(160, 210, 255, 0.7), transparent);
      animation: viento-sweep var(--dur) ease-in-out var(--delay) infinite;
    }

    @keyframes viento-sweep {
      0% {
        width: 0;
        left: -20px;
        opacity: 0
      }

      20% {
        opacity: 1
      }

      100% {
        width: 120px;
        left: 110%;
        opacity: 0
      }
    }

    .gota {
      position: absolute;
      border-radius: 50% 50% 50% 0;
      background: rgba(100, 180, 255, 0.7);
      transform: rotate(-45deg);
      animation: gota-fall var(--dur) ease-in var(--delay) infinite;
    }

    @keyframes gota-fall {
      0% {
        transform: rotate(-45deg) translate(0, 0);
        opacity: 0.8
      }

      100% {
        transform: rotate(-45deg) translate(var(--dx), 50px);
        opacity: 0
      }
    }

    .pano-arm {
      position: absolute;
      transform-origin: 16px 0px;
      animation: pano-rotate 1.4s ease-in-out infinite;
    }

    @keyframes pano-rotate {
      0% {
        transform: rotate(-35deg)
      }

      50% {
        transform: rotate(35deg)
      }

      100% {
        transform: rotate(-35deg)
      }
    }

    .brillo-circulo {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 220, 80, 0.4);
      animation: brillo-expand var(--dur) ease-out var(--delay) infinite;
    }

    @keyframes brillo-expand {
      0% {
        transform: scale(0.2);
        opacity: 0.8
      }

      100% {
        transform: scale(1.8);
        opacity: 0
      }
    }

    .estrella {
      position: absolute;
      animation: estrella-twinkle var(--dur) ease-in-out var(--delay) infinite;
    }

    @keyframes estrella-twinkle {

      0%,
      100% {
        transform: scale(0) rotate(0deg);
        opacity: 0
      }

      30% {
        transform: scale(1.2) rotate(20deg);
        opacity: 1
      }

      70% {
        transform: scale(0.8) rotate(40deg);
        opacity: 0.8
      }
    }

    .reflejo {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 200, 0.9) 0%, transparent 70%);
      animation: reflejo-pulse 2s ease-in-out infinite;
    }

    @keyframes reflejo-pulse {

      0%,
      100% {
        transform: scale(0.8);
        opacity: 0.4
      }

      50% {
        transform: scale(1.3);
        opacity: 0.9
      }
    }

    .auto-bounce {
      animation: auto-bounce 2.5s ease-in-out infinite;
    }

    @keyframes auto-bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0)
      }

      50% {
        transform: translateX(-50%) translateY(-6px)
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>🚗 Estado de tu auto</h1>
    <p>Ingresá la patente para ver el estado</p>
  </header>

  <div class="search-box">
    <input type="text" id="input-patente" placeholder="Ej: AB123CD" maxlength="8" autocomplete="off"
      autocorrect="off" spellcheck="false" onkeyup="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter') buscar()">
    <button class="btn-buscar" onclick="buscar()">🔍</button>
  </div>

  <div id="resultado">
    <div class="msg-box">
      <div class="icon">🔎</div>
      <p>Ingresá la patente de tu vehículo para ver en qué etapa se encuentra.</p>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════
    // CONFIG — sin token de Airtable: todo pasa por n8n.
    // Modo TEST: apretar "Listen for test event" en el nodo
    // "Webhook Estado" antes de cada prueba. Para producción,
    // activar el workflow y cambiar a ".../webhook".
    // ══════════════════════════════════════════════
    const CONFIG = {
      n8nUrl: 'https://n8n-n8n.sbbovb.easypanel.host/webhook-test/estado'
    };

    // Servicios que se muestran en la pantalla de "gracias por tu visita".
    // Decorativo, no requiere ir a buscar la lista a Airtable.
    const SERVICIOS_OFRECIDOS = ['Lavado Auto', 'Lavado 4x4', 'Encerado', 'Lavado completo + Encerado'];

    const ETAPAS = [
      { id: 'Recepción', label: 'Recepción', desc: 'Tu auto acaba de ingresar al lavadero', color: '#94a3b8', emoji: '📋' },
      { id: 'Lav. Interior', label: 'Lavado Interior', desc: 'Limpiando el interior de tu auto', color: '#3b82f6', emoji: '🧹' },
      { id: 'Lav. Exterior', label: 'Lavado Exterior', desc: 'Lavando la carrocería con agua y espuma', color: '#0ea5e9', emoji: '🚿' },
      { id: 'Secado', label: 'Secado', desc: 'Secando tu auto a mano', color: '#f59e0b', emoji: '💨' },
      { id: 'Encerado', label: 'Encerado', desc: 'Aplicando cera para proteger la pintura', color: '#a78bfa', emoji: '✨' },
      { id: 'Listo', label: '¡Listo!', desc: 'Tu auto está listo para retirar', color: '#22c55e', emoji: '🏁' }
    ];
    const ETAPA_INDEX = Object.fromEntries(ETAPAS.map((e, i) => [e.id, i]));

    // ══════════════════════════════════════════════
    // SEGURIDAD: escapar todo lo que va a innerHTML,
    // y validar el formato de patente antes de usarla.
    // ══════════════════════════════════════════════
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function patenteValida(s) {
      return /^[A-Z0-9]{6,8}$/.test(s);
    }
    function limpiarPatente(s) {
      return (s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    }

    // ══════════════════════════════════════════════
    // AUTO-BUSCAR desde URL param (?patente=...) — se limpia
    // y valida igual que la búsqueda manual antes de usarse.
    // ══════════════════════════════════════════════
    window.addEventListener('load', () => {
      const p = new URLSearchParams(window.location.search).get('patente');
      if (p) {
        document.getElementById('input-patente').value = limpiarPatente(p);
        buscar();
      }
    });

    // ══════════════════════════════════════════════
    // BUSCAR
    // ══════════════════════════════════════════════
    async function buscar() {
      const patente = limpiarPatente(document.getElementById('input-patente').value);
      if (!patente) return;

      if (!patenteValida(patente)) {
        mostrarNoEncontrado(patente);
        return;
      }

      document.getElementById('resultado').innerHTML =
        `<div class="spin-wrap"><div class="spinner"></div></div>`;

      try {
        const res = await fetch(`${CONFIG.n8nUrl}?patente=${encodeURIComponent(patente)}`);
        if (!res.ok) throw new Error('Sin respuesta');
        const data = await res.json();

        if (!data || !data.success || !data.etapa_actual) { mostrarNoEncontrado(patente); return; }

        if (data.etapa_actual === 'Entregado') {
          mostrarEntregado(data);
        } else {
          mostrarEstado(data);
        }
      } catch (e) {
        mostrarError(e.message);
      }
    }

    // ══════════════════════════════════════════════
    // RENDER ETAPA ACTIVA
    // ══════════════════════════════════════════════
    function mostrarEstado(data) {
      const etapaId = data.etapa_actual;
      const etapa = ETAPAS.find(e => e.id === etapaId) || ETAPAS[0];
      const idx = ETAPA_INDEX[etapaId] ?? 0;
      const pct = Math.round((idx / (ETAPAS.length - 1)) * 100);
      const esListo = etapaId === 'Listo';

      const stepsHtml = ETAPAS.map((e, i) => `
        <div class="step ${i < idx ? 'done' : ''} ${i === idx ? 'active' : ''}"
             style="${i === idx ? `color:${etapa.color}` : ''}">
          ${e.emoji}
        </div>`).join('');

      document.getElementById('resultado').innerHTML = `
        <div class="status-card">
          <div class="escenario ${getBgClass(etapaId)}">${buildEscena(etapaId)}</div>
          <div class="orden-info">
            <div class="patente-badge">${esc(data.patente) || '—'}</div>
            <div class="orden-meta">${esc(data.servicio)} · Orden #${esc(data.orden_id) || '—'}</div>
          </div>
          <div class="etapa-label">
            <div class="etapa-dot" style="background:${etapa.color};box-shadow:0 0 8px ${etapa.color}88"></div>
            <div>
              <div class="etapa-nombre">${etapa.emoji} ${etapa.label}</div>
              <div class="etapa-desc">${etapa.desc}</div>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%;background:${etapa.color}"></div>
            </div>
            <div class="progress-steps">${stepsHtml}</div>
          </div>
          ${esListo ? `<div class="listo-banner">✅ ¡Tu auto está listo! Podés venir a retirarlo.</div>` : ''}
        </div>`;
    }

    // ══════════════════════════════════════════════
    // RENDER ENTREGADO (pantalla de agradecimiento)
    // ══════════════════════════════════════════════
    function mostrarEntregado(data) {
      const fechaRaw = data.fecha_entrega || data.fecha_ingreso;
      const fechaStr = fechaRaw
        ? new Date(fechaRaw).toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' })
        : 'última visita';

      const estrellas = [
        { size: 18, top: '12px', left: '8%', delay: '0s', dur: '2.0s' },
        { size: 24, top: '20px', left: '80%', delay: '0.4s', dur: '2.3s' },
        { size: 14, top: '55px', left: '4%', delay: '0.8s', dur: '1.8s' },
        { size: 20, top: '35px', left: '88%', delay: '0.2s', dur: '2.1s' },
        { size: 16, top: '75px', left: '12%', delay: '1.2s', dur: '1.9s' },
        { size: 22, top: '50px', left: '84%', delay: '0.6s', dur: '2.4s' },
        { size: 12, top: '85px', left: '72%', delay: '1.0s', dur: '1.7s' },
      ].map(e => `<div class="e-star" style="font-size:${e.size}px;top:${e.top};left:${e.left};--dur:${e.dur};--delay:${e.delay}">✦</div>`).join('');

      const confetti = [
        { color: '#fbbf24', left: '20%', delay: '0s', dur: '2.5s', size: 6 },
        { color: '#34d399', left: '35%', delay: '0.4s', dur: '2.8s', size: 5 },
        { color: '#60a5fa', left: '55%', delay: '0.8s', dur: '2.3s', size: 7 },
        { color: '#f472b6', left: '70%', delay: '0.2s', dur: '3.0s', size: 5 },
        { color: '#a78bfa', left: '82%', delay: '1.1s', dur: '2.6s', size: 6 },
        { color: '#fbbf24', left: '10%', delay: '1.5s', dur: '2.9s', size: 4 },
      ].map(c => `<div class="confetti" style="width:${c.size}px;height:${c.size}px;background:${c.color};left:${c.left};top:-10px;--dur:${c.dur};--delay:${c.delay}"></div>`).join('');

      const pillsHtml = SERVICIOS_OFRECIDOS.map((s, i) =>
        `<div class="svc-pill" style="--delay:${(i * 0.07).toFixed(2)}s">${esc(s)}</div>`
      ).join('');

      document.getElementById('resultado').innerHTML = `
        <div class="entregado-card">
          <div class="entregado-hero">
            ${estrellas}
            ${confetti}
            <div class="entregado-emoji">🎉</div>
            <h2>¡Gracias por tu visita!</h2>
            <p class="sub">Esperamos verte pronto por el local 🚗</p>
          </div>

          <div class="entregado-body">
            <div class="patente-entregado">${esc(data.patente) || '—'}</div>
            <div class="servicio-entregado">${esc(data.servicio)}</div>

            <div class="visita-chip">
              <div class="vc-icon">📅</div>
              <div>
                <div class="vc-text">Última visita</div>
                <div class="vc-fecha">${esc(fechaStr)}</div>
              </div>
            </div>

            <div class="svc-titulo">Nuestros servicios</div>
            <div class="svc-lista">${pillsHtml}</div>

            <button class="volver-btn" onclick="document.getElementById('input-patente').value=''; document.getElementById('resultado').innerHTML=''; window.scrollTo(0,0)">
              🔍 Consultar otra patente
            </button>
          </div>
        </div>`;
    }

    // ══════════════════════════════════════════════
    // BG por etapa
    // ══════════════════════════════════════════════
    function getBgClass(etapa) {
      return {
        'Recepción': 'bg-recepcion',
        'Lav. Interior': 'bg-interior',
        'Lav. Exterior': 'bg-exterior',
        'Secado': 'bg-secado',
        'Encerado': 'bg-encerado',
        'Listo': 'bg-listo'
      }[etapa] || 'bg-recepcion';
    }

    // ══════════════════════════════════════════════
    // FÁBRICA DE ESCENAS
    // ══════════════════════════════════════════════
    function buildEscena(etapa) {
      switch (etapa) {
        case 'Recepción': return escenaRecepcion();
        case 'Lav. Interior': return escenaInterior();
        case 'Lav. Exterior': return escenaExterior();
        case 'Secado': return escenaSecado();
        case 'Encerado': return escenaEncerado();
        case 'Listo': return escenaListo();
        default: return escenaRecepcion();
      }
    }

    function svgAuto(opts = {}) {
      const { sucio = false, color = '#64748b', ventanas = '#93c5fd', claseExtra = '' } = opts;
      const manchas = sucio ? `
        <ellipse cx="44" cy="48" rx="8" ry="5" fill="rgba(101,67,33,0.7)" class="barro" style="animation-delay:0s"/>
        <ellipse cx="80" cy="52" rx="5" ry="3" fill="rgba(101,67,33,0.6)" class="barro" style="animation-delay:0.4s"/>
        <ellipse cx="110" cy="46" rx="6" ry="4" fill="rgba(101,67,33,0.65)" class="barro" style="animation-delay:0.8s"/>
        <ellipse cx="60" cy="56" rx="4" ry="2.5" fill="rgba(101,67,33,0.5)" class="barro" style="animation-delay:1.2s"/>
        <ellipse cx="98" cy="54" rx="3" ry="2" fill="rgba(101,67,33,0.55)" class="barro" style="animation-delay:0.6s"/>` : '';
      return `
        <svg width="160" height="80" viewBox="0 0 160 80" class="${claseExtra}">
          <rect x="10" y="42" width="140" height="28" rx="8" fill="${color}"/>
          <path d="M35 42 Q45 18 75 16 Q105 14 125 42 Z" fill="${color}"/>
          <path d="M82 22 Q95 18 118 40 L82 40 Z" fill="${ventanas}" opacity="0.85"/>
          <path d="M42 40 Q52 20 78 20 L78 40 Z" fill="${ventanas}" opacity="0.85"/>
          <circle cx="40" cy="70" r="12" fill="#1e293b" stroke="#475569" stroke-width="3"/>
          <circle cx="40" cy="70" r="5" fill="#475569"/>
          <circle cx="120" cy="70" r="12" fill="#1e293b" stroke="#475569" stroke-width="3"/>
          <circle cx="120" cy="70" r="5" fill="#475569"/>
          <rect x="143" y="50" width="10" height="8" rx="3" fill="#fef08a" opacity="0.9"/>
          <rect x="8" y="50" width="8" height="8" rx="3" fill="#f87171" opacity="0.8"/>
          ${manchas}
        </svg>`;
    }

    function escenaRecepcion() {
      return `
        <div style="position:absolute;bottom:0;left:0;right:0;height:28px;background:rgba(30,20,5,0.5)"></div>
        <div style="position:absolute;bottom:4px;left:30px;width:60px;height:8px;border-radius:50%;background:rgba(80,50,10,0.4)"></div>
        <div style="position:absolute;bottom:4px;right:40px;width:40px;height:6px;border-radius:50%;background:rgba(80,50,10,0.35)"></div>
        <div class="auto-base">${svgAuto({ sucio: true, color: '#475569', ventanas: '#7ba7c4' })}</div>
        <div class="polvo" style="width:5px;height:5px;top:40px;left:30%;--dx:-20px;--dy:30px;animation-delay:0s;animation-duration:2s"></div>
        <div class="polvo" style="width:3px;height:3px;top:60px;left:55%;--dx:15px;--dy:20px;animation-delay:0.7s;animation-duration:1.8s"></div>
        <div class="polvo" style="width:4px;height:4px;top:50px;right:25%;--dx:-10px;--dy:25px;animation-delay:1.2s;animation-duration:2.2s"></div>`;
    }

    function escenaInterior() {
      return `
        <div style="position:absolute;bottom:0;left:0;right:0;height:28px;background:rgba(5,15,30,0.6)"></div>
        <div class="auto-base">${svgAuto({ color: '#374151', ventanas: '#93c5fd' })}</div>
        <div class="aspiradora">
          <svg width="52" height="52" viewBox="0 0 52 52">
            <ellipse cx="26" cy="32" rx="18" ry="12" fill="#1d4ed8"/>
            <ellipse cx="26" cy="29" rx="18" ry="10" fill="#2563eb"/>
            <path d="M8 30 Q4 20 10 10" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>
            <rect x="4" y="6" width="14" height="6" rx="3" fill="#93c5fd"/>
            <circle cx="14" cy="43" r="4" fill="#1e3a8a"/>
            <circle cx="38" cy="43" r="4" fill="#1e3a8a"/>
            <circle cx="36" cy="26" r="3" fill="#7dd3fc" opacity="0.9"/>
          </svg>
        </div>
        <div class="polvo" style="width:4px;height:4px;top:100px;left:22%;--dx:-18px;--dy:-25px;animation-delay:0s;animation-duration:1.4s;background:rgba(200,180,140,0.6)"></div>
        <div class="polvo" style="width:3px;height:3px;top:108px;left:25%;--dx:-12px;--dy:-20px;animation-delay:0.5s;animation-duration:1.6s;background:rgba(200,180,140,0.5)"></div>
        <div class="polvo" style="width:5px;height:5px;top:95px;left:19%;--dx:-22px;--dy:-18px;animation-delay:0.9s;animation-duration:1.3s;background:rgba(200,180,140,0.55)"></div>
        <div class="polvo" style="width:3px;height:3px;top:112px;left:28%;--dx:-8px;--dy:-28px;animation-delay:0.3s;animation-duration:1.7s;background:rgba(200,180,140,0.4)"></div>`;
    }

    function escenaExterior() {
      const burbujas = [
        { size: 14, left: '15%', delay: '0s', dur: '2.2s' }, { size: 20, left: '28%', delay: '0.4s', dur: '2.8s' },
        { size: 10, left: '45%', delay: '0.8s', dur: '2.0s' }, { size: 18, left: '60%', delay: '0.2s', dur: '2.5s' },
        { size: 12, left: '72%', delay: '1.1s', dur: '2.1s' }, { size: 22, left: '82%', delay: '0.6s', dur: '3.0s' },
        { size: 8, left: '38%', delay: '1.4s', dur: '1.9s' }, { size: 16, left: '52%', delay: '0.9s', dur: '2.6s' },
      ].map(b => `<div class="burbuja" style="width:${b.size}px;height:${b.size}px;left:${b.left};bottom:30px;--dur:${b.dur};--delay:${b.delay}"></div>`).join('');
      return `
        <div style="position:absolute;bottom:0;left:0;right:0;height:28px;background:rgba(5,20,40,0.7)"></div>
        <div style="position:absolute;bottom:4px;left:20%;width:60%;height:10px;border-radius:50%;background:rgba(100,180,255,0.12)"></div>
        <div class="auto-base">${svgAuto({ color: '#334155', ventanas: '#bae6fd' })}</div>
        <div class="espuma" style="width:30px;height:18px;bottom:72px;left:38%;animation-delay:0s;animation-duration:2s"></div>
        <div class="espuma" style="width:24px;height:14px;bottom:80px;left:55%;animation-delay:0.7s;animation-duration:1.8s"></div>
        <div class="espuma" style="width:20px;height:12px;bottom:68px;left:48%;animation-delay:1.2s;animation-duration:2.2s"></div>
        ${burbujas}`;
    }

    function escenaSecado() {
      const vientos = [35, 55, 75, 95, 115].map((top, i) => `<div class="viento" style="top:${top}px;left:5%;--dur:${1.3 + i * 0.1}s;--delay:${i * 0.2}s"></div>`).join('');
      const gotas = [
        { left: '35%', bot: '60px', delay: '0s', dur: '1.2s', dx: '20px' },
        { left: '50%', bot: '55px', delay: '0.4s', dur: '1.4s', dx: '30px' },
        { left: '42%', bot: '70px', delay: '0.7s', dur: '1.1s', dx: '15px' },
        { left: '60%', bot: '62px', delay: '0.2s', dur: '1.3s', dx: '25px' },
        { left: '55%', bot: '58px', delay: '0.9s', dur: '1.5s', dx: '18px' },
      ].map(g => `<div class="gota" style="width:6px;height:9px;left:${g.left};bottom:${g.bot};--dur:${g.dur};--delay:${g.delay};--dx:${g.dx}"></div>`).join('');
      return `
        <div style="position:absolute;bottom:0;left:0;right:0;height:28px;background:rgba(5,18,35,0.6)"></div>
        ${vientos}
        <div class="auto-base">${svgAuto({ color: '#3b5268', ventanas: '#bae6fd' })}</div>
        ${gotas}`;
    }

    function escenaEncerado() {
      const brillos = [
        { size: 40, bot: '90px', left: '30%', delay: '0s', dur: '2s' },
        { size: 32, bot: '75px', left: '55%', delay: '0.7s', dur: '2.3s' },
        { size: 24, bot: '100px', left: '45%', delay: '1.3s', dur: '1.8s' },
      ].map(b => `<div class="brillo-circulo" style="width:${b.size}px;height:${b.size}px;bottom:${b.bot};left:${b.left};--dur:${b.dur};--delay:${b.delay}"></div>`).join('');
      return `
        <div style="position:absolute;bottom:0;left:0;right:0;height:28px;background:rgba(12,8,30,0.7)"></div>
        <div class="auto-base">${svgAuto({ color: '#4c3d8a', ventanas: '#c4b5fd' })}</div>
        ${brillos}
        <div class="pano-arm" style="position:absolute;bottom:96px;left:calc(50% + 10px)">
          <svg width="32" height="44" viewBox="0 0 32 44">
            <rect x="14" y="0" width="5" height="26" rx="2.5" fill="#78716c"/>
            <rect x="2" y="26" width="28" height="16" rx="6" fill="#e7e5e4"/>
            <rect x="4" y="28" width="24" height="3" rx="1.5" fill="#d6d3d1"/>
            <rect x="4" y="34" width="24" height="3" rx="1.5" fill="#d6d3d1"/>
          </svg>
        </div>`;
    }

    function escenaListo() {
      const estrellas = [
        { size: 20, top: '20px', left: '10%', delay: '0s', dur: '1.8s' },
        { size: 28, top: '15px', left: '78%', delay: '0.5s', dur: '2.2s' },
        { size: 16, top: '50px', left: '5%', delay: '1.0s', dur: '1.6s' },
        { size: 22, top: '30px', left: '88%', delay: '0.3s', dur: '2.0s' },
        { size: 18, top: '65px', left: '15%', delay: '1.4s', dur: '1.9s' },
        { size: 24, top: '45px', left: '82%', delay: '0.8s', dur: '2.1s' },
        { size: 14, top: '80px', left: '70%', delay: '0.2s', dur: '1.7s' },
      ].map(e => `<div class="estrella" style="font-size:${e.size}px;top:${e.top};left:${e.left};--dur:${e.dur};--delay:${e.delay}">✦</div>`).join('');
      return `
        <div style="position:absolute;bottom:0;left:0;right:0;height:28px;background:rgba(5,20,10,0.6)"></div>
        <div class="reflejo" style="width:120px;height:20px;bottom:20px;left:calc(50% - 60px)"></div>
        ${estrellas}
        <div class="auto-base auto-bounce">
          ${svgAuto({ color: '#166534', ventanas: '#6ee7b7' })}
          <div class="reflejo" style="position:absolute;width:24px;height:14px;top:10px;right:20px"></div>
        </div>`;
    }

    // ══════════════════════════════════════════════
    // MENSAJES
    // ══════════════════════════════════════════════
    function mostrarNoEncontrado(patente) {
      document.getElementById('resultado').innerHTML = `
        <div class="msg-box">
          <div class="icon">🔍</div>
          <p>No encontramos ningún auto con la patente <b>${esc(patente)}</b> en proceso.</p>
        </div>`;
    }
    function mostrarError(msg) {
      document.getElementById('resultado').innerHTML = `
        <div class="msg-box">
          <div class="icon">⚠️</div>
          <p>No se pudo conectar al servidor.<br><small style="color:#64748b">${esc(msg)}</small></p>
        </div>`;
    }
  </script>
</body>

</html>
